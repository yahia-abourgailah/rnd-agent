# Source registry — adding a new source is one adapter file + one entry here.
# Each entry is loaded into a models.source.SourceConfig.
#
# adapter_name must match a class registered in
# src/launch_intel/watch/adapters/__init__.py

sources:
  - name: generic_developer_demo
    tier: 1
    source_type: developer_site
    urls:
      - "https://example-developer.com/launches"
    crawl_frequency: "30m"
    adapter_name: generic_developer_site

