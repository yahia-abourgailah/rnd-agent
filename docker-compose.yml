# Base stack — shared by every environment. Intentionally does NOT publish
# host ports (that's a dev convenience added by docker-compose.override.yml).
#
#   Local dev:   docker compose up -d
#                (base + docker-compose.override.yml, auto-merged)
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Credentials default to dev values but can be overridden from the shell env
# (or an --env-file) so staging/prod supply their own without editing this file.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-launch_intel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-launch_intel}
      POSTGRES_DB: ${POSTGRES_DB:-launch_intel}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-launch_intel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # TODO(phase-later): enable once the dashboard is wired up against Postgres.
  # metabase:
  #   image: metabase/metabase:latest
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - postgres

volumes:
  pgdata:
